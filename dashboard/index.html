<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bank of Agents — Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0a0a0a; color: #f0f0f0; min-height: 100vh; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid #1e1e1e; background: #0d0d0d; }
    .topbar .logo { font-size: 15px; font-weight: 700; color: #fff; text-decoration: none; }
    .topbar .logo span { color: #4ade80; }
    .topbar .logout { font-size: 12px; color: #555; cursor: pointer; background: none; border: none; }
    .topbar .logout:hover { color: #888; }
    .main { max-width: 900px; margin: 0 auto; padding: 32px 24px; }
    h2 { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: #fff; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
    @media(max-width:600px){ .stats { grid-template-columns: repeat(2,1fr); } }
    .stat { background: #111; border: 1px solid #1e1e1e; border-radius: 10px; padding: 16px; }
    .stat .label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .stat .value { font-size: 26px; font-weight: 700; color: #fff; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .btn { padding: 8px 16px; background: #4ade80; color: #0a0a0a; border: none; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn:hover { background: #22c55e; }
    .btn-sm { padding: 5px 11px; font-size: 12px; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-ghost { background: transparent; color: #555; border: 1px solid #2a2a2a; }
    .btn-ghost:hover { color: #aaa; border-color: #444; }
    .agent-card { background: #111; border: 1px solid #1e1e1e; border-radius: 10px; padding: 18px; margin-bottom: 10px; }
    .agent-header { display: flex; align-items: center; justify-content: space-between; }
    .agent-name { font-size: 15px; font-weight: 600; color: #fff; }
    .agent-meta { font-size: 12px; color: #555; margin-top: 3px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 600; }
    .badge-active { background: #14532d; color: #4ade80; }
    .badge-inactive { background: #1c1c1c; color: #666; }
    .badge-canceled { background: #450a0a; color: #f87171; }
    .agent-details { margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    @media(max-width:500px){ .agent-details { grid-template-columns: 1fr 1fr; } }
    .detail { background: #0d0d0d; border-radius: 7px; padding: 10px 12px; }
    .detail .dlabel { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
    .detail .dvalue { font-size: 13px; color: #ccc; font-family: monospace; }
    .actions { display: flex; gap: 8px; margin-top: 12px; }
    .empty { text-align: center; padding: 48px; color: #444; }
    .empty .icon { font-size: 32px; margin-bottom: 12px; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #111; border: 1px solid #2a2a2a; border-radius: 12px; padding: 28px; width: 100%; max-width: 400px; }
    .modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 20px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; }
    .field input { width: 100%; padding: 10px 12px; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 7px; color: #f0f0f0; font-size: 14px; outline: none; }
    .field input:focus { border-color: #4ade80; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* Auth screen */
    #authScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-box { background: #111; border: 1px solid #1e1e1e; border-radius: 12px; padding: 32px; width: 100%; max-width: 380px; text-align: center; }
    .auth-box h2 { margin-bottom: 8px; }
    .auth-box p { font-size: 14px; color: #666; margin-bottom: 24px; }
    .auth-box input { width: 100%; padding: 12px; background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 7px; color: #f0f0f0; font-size: 14px; margin-bottom: 12px; outline: none; }
    .auth-box input:focus { border-color: #4ade80; }
    .auth-error { color: #f87171; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>

<!-- Auth Screen -->
<div id="authScreen">
  <div class="auth-box">
    <div style="font-size:28px;margin-bottom:12px">🦞</div>
    <h2>Bank of Agents</h2>
    <p>Enter your API key to access the dashboard</p>
    <input type="password" id="keyInput" placeholder="boa_live_..." />
    <button class="btn" style="width:100%" onclick="login()">Sign in</button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" style="display:none">
  <div class="topbar">
    <a href="/" class="logo">Bank of <span>Agents</span></a>
    <div style="display:flex;align-items:center;gap:16px">
      <span id="operatorEmail" style="font-size:12px;color:#555"></span>
      <button class="logout" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="main">
    <div class="stats">
      <div class="stat"><div class="label">Total Agents</div><div class="value" id="statAgents">—</div></div>
      <div class="stat"><div class="label">Active Cards</div><div class="value" id="statCards">—</div></div>
      <div class="stat"><div class="label">Transactions</div><div class="value" id="statTxns">—</div></div>
      <div class="stat"><div class="label">Total Spend</div><div class="value" id="statSpend">—</div></div>
    </div>

    <div class="section-header">
      <h2>Agents</h2>
      <button class="btn" onclick="openCreateModal()">+ New Agent</button>
    </div>

    <div id="agentList"></div>
  </div>
</div>

<!-- Create Agent Modal -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <h3>Create Agent</h3>
    <div class="field"><label>Agent Name</label><input type="text" id="newAgentName" placeholder="research-agent-01" /></div>
    <div class="field"><label>Daily Spend Limit (USD)</label><input type="number" id="newAgentLimit" placeholder="100" value="100" /></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('createModal')">Cancel</button>
      <button class="btn" onclick="createAgent()">Create Agent</button>
    </div>
  </div>
</div>

<!-- Edit Limit Modal -->
<div class="modal-overlay" id="limitModal">
  <div class="modal">
    <h3>Update Spend Limit</h3>
    <input type="hidden" id="limitAgentId" />
    <div class="field"><label>New Daily Limit (USD)</label><input type="number" id="newLimit" placeholder="100" /></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('limitModal')">Cancel</button>
      <button class="btn" onclick="updateLimit()">Update</button>
    </div>
  </div>
</div>

<script>
const API = "https://agentbank-gateway-5ynztur7.uc.gateway.dev";
let apiKey = localStorage.getItem("boa_key") || "";

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { "X-API-Key": apiKey, "Content-Type": "application/json", ...(opts.headers || {}) }
  });
  return res.json();
}

async function login() {
  const key = document.getElementById("keyInput").value.trim();
  if (!key) return;
  apiKey = key;
  const data = await apiFetch("/v1/keys/me");
  if (data.error) {
    document.getElementById("authError").textContent = "Invalid API key";
    return;
  }
  localStorage.setItem("boa_key", key);
  showDashboard(data);
}

function logout() {
  localStorage.removeItem("boa_key");
  location.reload();
}

async function showDashboard(operator) {
  document.getElementById("authScreen").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  document.getElementById("operatorEmail").textContent = operator.operator_email;
  await loadAll();
}

async function loadAll() {
  const [agentsData, txnData] = await Promise.all([
    apiFetch("/v1/agents"),
    apiFetch("/v1/transactions"),
  ]);
  const agents = agentsData.agents || [];
  const txns = txnData.transactions || [];

  // Stats
  document.getElementById("statAgents").textContent = agents.length;
  document.getElementById("statCards").textContent = agents.length;
  document.getElementById("statTxns").textContent = txns.length;
  const totalSpend = txns.reduce((s, t) => s + t.amount_usd, 0);
  document.getElementById("statSpend").textContent = "$" + totalSpend.toFixed(2);

  // Agent list
  const list = document.getElementById("agentList");
  if (!agents.length) {
    list.innerHTML = `<div class="empty"><div class="icon">🤖</div><p>No agents yet. Create your first agent to get started.</p></div>`;
    return;
  }
  list.innerHTML = agents.map(a => renderAgent(a, txns)).join("");
}

function renderAgent(a, allTxns) {
  const agentTxns = allTxns.filter(t => t.agent_id === a.agent_id);
  const spend = agentTxns.reduce((s,t) => s+t.amount_usd, 0);
  const limit = (a.daily_limit_cents / 100).toFixed(0);
  return `
    <div class="agent-card">
      <div class="agent-header">
        <div>
          <div class="agent-name">${a.name}</div>
          <div class="agent-meta">${a.agent_id}</div>
        </div>
        <span class="badge badge-active">active</span>
      </div>
      <div class="agent-details">
        <div class="detail"><div class="dlabel">Daily Limit</div><div class="dvalue">$${limit}/day</div></div>
        <div class="detail"><div class="dlabel">Total Spend</div><div class="dvalue">$${spend.toFixed(2)}</div></div>
        <div class="detail"><div class="dlabel">Transactions</div><div class="dvalue">${agentTxns.length}</div></div>
      </div>
      <div class="actions">
        <button class="btn btn-sm btn-ghost" onclick="openLimitModal('${a.agent_id}', ${a.daily_limit_cents})">Edit Limit</button>
        <button class="btn btn-sm btn-danger" onclick="freezeAgent('${a.agent_id}')">Freeze</button>
      </div>
      ${agentTxns.length ? `<div style="margin-top:12px;font-size:12px;color:#555">
        ${agentTxns.slice(0,5).map(t => `<div style="padding:4px 0;border-top:1px solid #1a1a1a;display:flex;justify-content:space-between">
          <span>${t.merchant || 'unknown'}</span><span style="color:#ccc">$${t.amount_usd.toFixed(2)}</span>
        </div>`).join("")}
      </div>` : ""}
    </div>`;
}

function openCreateModal() { document.getElementById("createModal").classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }
function openLimitModal(agentId, currentCents) {
  document.getElementById("limitAgentId").value = agentId;
  document.getElementById("newLimit").value = (currentCents/100).toFixed(0);
  document.getElementById("limitModal").classList.add("open");
}

async function createAgent() {
  const name = document.getElementById("newAgentName").value.trim();
  const limit = parseFloat(document.getElementById("newAgentLimit").value) * 100;
  if (!name) return;
  await apiFetch("/v1/agents", { method: "POST", body: JSON.stringify({ name, daily_limit: limit }) });
  closeModal("createModal");
  loadAll();
}

async function updateLimit() {
  const agentId = document.getElementById("limitAgentId").value;
  const limit = parseFloat(document.getElementById("newLimit").value) * 100;
  await apiFetch(`/v1/agents/${agentId}/limit`, { method: "PATCH", body: JSON.stringify({ daily_limit: limit }) });
  closeModal("limitModal");
  loadAll();
}

async function freezeAgent(agentId) {
  if (!confirm("Freeze this agent's card? This cannot be undone.")) return;
  await apiFetch(`/v1/agents/${agentId}/freeze`, { method: "POST" });
  loadAll();
}

// Auto-login if key stored
if (apiKey) {
  apiFetch("/v1/keys/me").then(data => {
    if (!data.error) showDashboard(data);
    else { localStorage.removeItem("boa_key"); apiKey = ""; }
  });
}
</script>
</body>
</html>
